<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-family: var(--mono);
        font-size: 11.5px;
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px solid;
        font-weight: 500;
      }
      .chip .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
      }
      .grid2 {
        margin-top: 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .toast {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 7px;
        border: 1px solid var(--canvas-bd);
        background: var(--canvas-bg);
      }
      .toast .mark {
        width: 22px;
        height: 22px;
        border-radius: 11px;
        display: grid;
        place-items: center;
        flex: none;
      }
      .toast .title {
        font-size: 12.5px;
        color: var(--canvas-fg-1);
        font-weight: 500;
      }
      .toast .sub {
        font-size: 11.5px;
        color: var(--canvas-fg-3);
        margin-top: 2px;
        font-family: var(--mono);
      }
    </style>
  </head>
  <body>
    <div class="label">Semantic intents · success / warning / failure / info</div>
    <div class="row">
      <span class="chip" style="color: #065f46; background: #ecfdf5; border-color: #a7f3d0"
        ><span class="dot" style="background: #10b981"></span>success</span
      >
      <span class="chip" style="color: #92400e; background: #fffbeb; border-color: #fde68a"
        ><span class="dot" style="background: #f59e0b"></span>warning</span
      >
      <span class="chip" style="color: #9f1239; background: #fff1f2; border-color: #fecdd3"
        ><span class="dot" style="background: #f43f5e"></span>failure</span
      >
      <span class="chip" style="color: #0e7490; background: #ecfeff; border-color: #a5f3fc"
        ><span class="dot" style="background: #22d3ee"></span>info</span
      >
      <span class="chip" style="color: #5b21b6; background: #f5f3ff; border-color: #ddd6fe"
        ><span class="dot" style="background: #a78bfa"></span>secondary</span
      >
    </div>
    <div class="grid2">
      <div class="toast">
        <div class="mark" style="background: rgba(16, 185, 129, 0.16); color: #10b981">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </div>
        <div>
          <div class="title">Class created</div>
          <div class="sub">cls_organism · 2 attributes</div>
        </div>
      </div>
      <div class="toast">
        <div class="mark" style="background: rgba(244, 63, 94, 0.16); color: #f43f5e">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </div>
        <div>
          <div class="title" style="font-family: var(--mono); font-size: 11.5px">
            pipeline.run.failed
          </div>
          <div class="sub">connection refused at step 2</div>
        </div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        align-items: center;
        gap: 26px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .ic-wrap {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: #f7f9fb;
        border: 1px solid #e5e9ee;
        display: grid;
        place-items: center;
        color: #475569;
      }
      .ic-wrap svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        stroke-width: 1.75;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .name {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--canvas-fg-3);
      }
      .meta {
        font-size: 12px;
        color: var(--canvas-fg-2);
        margin-bottom: 8px;
      }
    </style>
  </head>

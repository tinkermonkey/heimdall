<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 12px;
      }
      .tabs {
        display: flex;
        border-bottom: 1px solid #e5e9ee;
        margin-bottom: 16px;
      }
      .tab {
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 500;
        color: #64748b;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .tab.active {
        color: #0b1220;
        border-bottom-color: #0b1220;
      }
      .tab .count {
        font-family: var(--mono);
        font-size: 11px;
        color: #94a3b8;
      }
      .tab.active .count {
        color: #0e7ea3;
      }

      .tree {
        font-family: var(--mono);
        font-size: 12.5px;
        color: #0b1220;
      }
      .row {
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 16px;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px dashed #e5e9ee;
      }
      .node {
        display: inline-flex;
        align-items: center;
        height: 30px;
        padding: 0 10px 0 8px;
        border: 1px solid #e5e9ee;
        border-radius: 4px;
        background: #fff;
        max-width: 100%;
      }
      .node .sw {
        width: 3px;
        height: 16px;
        border-radius: 1px;
        margin-right: 8px;
        flex: none;
      }
      .node.selected {
        border-color: #0e7ea3;
        box-shadow: 0 0 0 1px #0e7ea3;
      }
      .node .badge {
        font-size: 10px;
        color: #64748b;
        margin-left: 8px;
        padding-left: 8px;
        border-left: 1px solid #e5e9ee;
      }
      .desc {
        font-family: var(--font-sans);
        font-size: 13px;
        color: #475569;
      }
      .indent-1 {
        padding-left: 18px;
      }
      .indent-2 {
        padding-left: 36px;
      }
    </style>
  </head>
  <body>
    <div class="label">Tabs</div>
    <div class="tabs">
      <div class="tab active">Hierarchy <span class="count">128</span></div>
      <div class="tab">Attributes <span class="count">42</span></div>
      <div class="tab">Relationships <span class="count">18</span></div>
      <div class="tab">Activity</div>
    </div>

    <div class="label">Hierarchy nodes</div>
    <div class="tree">
      <div class="row">
        <div class="node">
          <span class="sw" style="background: #34d399"></span>life.thing<span class="badge"
            >root</span
          >
        </div>
        <div class="desc">All biological entities</div>
      </div>
      <div class="row">
        <div class="node indent-1">
          <span class="sw" style="background: #34d399"></span>life.organism<span class="badge"
            >1,247</span
          >
        </div>
        <div class="desc">Any living organism</div>
      </div>
      <div class="row">
        <div class="node selected indent-2">
          <span class="sw" style="background: #34d399"></span>life.organism.mammal<span
            class="badge"
            >312</span
          >
        </div>
        <div class="desc">Warm-blooded vertebrates</div>
      </div>
      <div class="row">
        <div class="node">
          <span class="sw" style="background: #fbbf24"></span>climate.station<span class="badge"
            >89</span
          >
        </div>
        <div class="desc">Weather monitoring stations</div>
      </div>
    </div>
  </body>
</html>

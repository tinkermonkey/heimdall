<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
        background: #0b0f14;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(230, 237, 243, 0.5);
        margin-bottom: 12px;
      }
      .nav {
        background: #0f141b;
        border: 1px solid #1e2733;
        border-radius: 8px;
        padding: 10px 8px;
        width: 320px;
      }
      .section {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #4a5563;
        padding: 8px 8px 6px;
        font-weight: 500;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        color: #a6b1bd;
        font-size: 13.5px;
        position: relative;
        cursor: pointer;
      }
      .item:hover {
        background: #131a23;
        color: #e6edf3;
      }
      .item.active {
        background: #131a23;
        color: #e6edf3;
      }
      .item.active::before {
        content: "";
        position: absolute;
        left: -8px;
        top: 6px;
        bottom: 6px;
        width: 2px;
        background: #22d3ee;
        border-radius: 0 2px 2px 0;
      }
      .item svg {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        stroke-width: 1.75;
        fill: none;
        flex: none;
      }
      .count {
        margin-left: auto;
        font-family: var(--mono);
        font-size: 11px;
        color: #6e7a87;
      }
      .item.active .count {
        color: #22d3ee;
      }
    </style>
  </head>
  <body>
    <div class="label">Sidebar nav · active = surface bg + 2px cyan bar</div>
    <div class="nav">
      <div class="section">Workspace</div>
      <div class="item">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="3" width="7" height="7" rx="1" />
          <rect x="14" y="14" width="7" height="7" rx="1" />
          <rect x="3" y="14" width="7" height="7" rx="1" /></svg
        >Dashboard
      </div>
      <div class="item active">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12 9 6 21 6" />
          <path d="M3 12 9 18 21 18" />
          <circle cx="3" cy="12" r="2" />
          <circle cx="21" cy="6" r="2" />
          <circle cx="21" cy="18" r="2" /></svg
        >Schema<span class="count">128</span>
      </div>
      <div class="item">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3" />
          <path d="M3 5v6c0 1.7 4 3 9 3s9-1.3 9-3V5" />
          <path d="M3 11v6c0 1.7 4 3 9 3s9-1.3 9-3v-6" /></svg
        >Individuals<span class="count">12,480</span>
      </div>
      <div class="item">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="6" height="12" rx="1" />
          <rect x="16" y="6" width="6" height="12" rx="1" />
          <path d="M8 12h8" />
          <path d="M12 9l3 3-3 3" /></svg
        >Pipelines<span class="count">17</span>
      </div>
      <div class="item">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="6" cy="6" r="3" />
          <circle cx="18" cy="6" r="3" />
          <circle cx="12" cy="18" r="3" />
          <path d="M8 8 16 16 M16 8 8 16 M12 9v6" /></svg
        >Graph view
      </div>
    </div>
  </body>
</html>

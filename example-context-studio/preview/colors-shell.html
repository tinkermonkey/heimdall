<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 20px 24px;
        background: #0b0f14;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      .sw {
        border-radius: 6px;
        padding: 10px 12px;
        min-height: 86px;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .sw .name {
        font-family: var(--mono);
        font-size: 10.5px;
        font-weight: 500;
        color: #e6edf3;
      }
      .sw .hex {
        font-family: var(--mono);
        font-size: 10px;
        color: rgba(230, 237, 243, 0.5);
        margin-top: 2px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(230, 237, 243, 0.5);
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="label">Shell · dark IDE chrome (sidebar / topbar / titlebar / statusbar)</div>
    <div class="grid">
      <div class="sw" style="background: #0b0f14">
        <div class="name">--shell-bg</div>
        <div class="hex">#0B0F14</div>
      </div>
      <div class="sw" style="background: #0f141b">
        <div class="name">--shell-bg-2</div>
        <div class="hex">#0F141B</div>
      </div>
      <div class="sw" style="background: #131a23">
        <div class="name">--shell-surface</div>
        <div class="hex">#131A23</div>
      </div>
      <div class="sw" style="background: #1a2230">
        <div class="name">--shell-surface-2</div>
        <div class="hex">#1A2230</div>
      </div>
      <div class="sw" style="background: #1e2733">
        <div class="name">--shell-border</div>
        <div class="hex">#1E2733</div>
      </div>
      <div class="sw" style="background: #2a3645">
        <div class="name">--shell-border-2</div>
        <div class="hex">#2A3645</div>
      </div>
      <div class="sw" style="background: #0b0f14; color: #e6edf3">
        <div class="name" style="color: #e6edf3">--shell-fg-1</div>
        <div class="hex" style="color: rgba(230, 237, 243, 0.6)">#E6EDF3</div>
      </div>
      <div class="sw" style="background: #0b0f14">
        <div class="name" style="color: #a6b1bd">--shell-fg-2</div>
        <div class="hex" style="color: rgba(166, 177, 189, 0.7)">#A6B1BD</div>
      </div>
    </div>
  </body>
</html>

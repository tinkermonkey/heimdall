<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
        background: #0b0f14;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(230, 237, 243, 0.5);
        margin-bottom: 14px;
      }
      .palette {
        width: 520px;
        background: #0f141b;
        border: 1px solid #2a3645;
        border-radius: 12px;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        overflow: hidden;
      }
      .input-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 14px;
        border-bottom: 1px solid #1e2733;
      }
      .input-row svg {
        stroke: #6e7a87;
        stroke-width: 2;
        fill: none;
      }
      .input-row input {
        flex: 1;
        background: transparent;
        border: 0;
        outline: none;
        color: #e6edf3;
        font-size: 15px;
        font-family: inherit;
      }
      .esc {
        font-family: var(--mono);
        font-size: 10px;
        color: #6e7a87;
        border: 1px solid #1e2733;
        padding: 2px 6px;
        border-radius: 3px;
      }
      .results {
        padding: 6px;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 6px;
        color: #e6edf3;
        font-size: 13px;
        cursor: pointer;
      }
      .item.first {
        background: #131a23;
      }
      .kind {
        font-family: var(--mono);
        font-size: 10px;
        color: #6e7a87;
        background: #0b0f14;
        border: 1px solid #1e2733;
        padding: 2px 6px;
        border-radius: 3px;
        width: 56px;
        text-align: center;
        flex: none;
      }
      .item svg {
        stroke: currentColor;
        stroke-width: 1.75;
        fill: none;
        color: #6e7a87;
        width: 16px;
        height: 16px;
      }
      .label2 {
        flex: 1;
      }
      .arrow {
        color: #22d3ee;
        opacity: 0;
      }
      .item.first .arrow {
        opacity: 1;
      }
      .foot {
        display: flex;
        gap: 16px;
        padding: 8px 14px;
        border-top: 1px solid #1e2733;
        font-size: 11px;
        color: #6e7a87;
      }
    </style>
  </head>
  <body>
    <div class="label">Command palette · ⌘K</div>
    <div class="palette">
      <div class="input-row">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="7" />
          <path d="m21 21-4.3-4.3" />
        </svg>
        <input value="run pip" placeholder="Search or run command…" />
        <span class="esc">esc</span>
      </div>
      <div class="results">
        <div class="item first">
          <span class="kind">action</span>
          <svg viewBox="0 0 24 24">
            <path d="m6 4 14 8-14 8z" fill="currentColor" stroke="none" />
          </svg>
          <span class="label2"
            >Run pipeline ·
            <span style="font-family: var(--mono); font-size: 12px; color: #a6b1bd"
              >ingest organisms</span
            ></span
          >
          <span class="arrow">↵</span>
        </div>
        <div class="item">
          <span class="kind">page</span>
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="6" height="12" rx="1" />
            <rect x="16" y="6" width="6" height="12" rx="1" />
            <path d="M8 12h8" />
          </svg>
          <span class="label2">Pipelines</span>
        </div>
        <div class="item">
          <span class="kind">class</span>
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12 9 6 21 6" />
            <path d="M3 12 9 18 21 18" />
          </svg>
          <span class="label2"
            >life.organism ·
            <span style="font-family: var(--mono); font-size: 12px; color: #6e7a87"
              >cls_4f3a</span
            ></span
          >
        </div>
      </div>
      <div class="foot"><span>↑↓ navigate</span><span>↵ open</span><span>esc close</span></div>
    </div>
  </body>
</html>

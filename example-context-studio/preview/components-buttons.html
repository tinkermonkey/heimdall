<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 34px;
        padding: 0 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid transparent;
        cursor: pointer;
        font-family: inherit;
      }
      .btn-primary {
        background: #0b1220;
        color: #fff;
      }
      .btn-accent {
        background: #0e7ea3;
        color: #fff;
      }
      .btn-ghost {
        background: transparent;
        color: #475569;
        border-color: #e5e9ee;
      }
      .btn-danger {
        background: #f43f5e;
        color: #fff;
        border-color: #f43f5e;
      }
      .btn-sm {
        height: 28px;
        padding: 0 10px;
        font-size: 12px;
      }
      .btn-icon {
        width: 34px;
        padding: 0;
      }
      .btn svg {
        width: 14px;
        height: 14px;
      }
      .meta {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--canvas-fg-3);
        margin-bottom: 6px;
      }
    </style>
  </head>
  <body>
    <div class="label">Buttons</div>
    <div class="meta">Default · 34px height · 6px radius · 13px medium</div>
    <div class="row">
      <button class="btn btn-primary">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M12 5v14M5 12h14" /></svg
        >New class
      </button>
      <button class="btn btn-accent">Run pipeline</button>
      <button class="btn btn-ghost">Cancel</button>
      <button class="btn btn-danger">Delete</button>
      <button class="btn btn-ghost btn-icon">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="1" />
          <circle cx="19" cy="12" r="1" />
          <circle cx="5" cy="12" r="1" />
        </svg>
      </button>
    </div>
    <div class="meta" style="margin-top: 14px">Small · 28px height · 12px font</div>
    <div class="row">
      <button class="btn btn-primary btn-sm">Save</button>
      <button class="btn btn-ghost btn-sm">Discard</button>
      <button class="btn btn-accent btn-sm">+ Add field</button>
    </div>
  </body>
</html>

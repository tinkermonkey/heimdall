<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
        background: #0b0f14;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(230, 237, 243, 0.5);
        margin-bottom: 18px;
      }
      .row {
        display: flex;
        gap: 28px;
        align-items: center;
      }
      .mark-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .mark {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: linear-gradient(135deg, #22d3ee 0%, #0e7ea3 100%);
        display: grid;
        place-items: center;
        flex: none;
        position: relative;
        overflow: hidden;
      }
      .mark::after {
        content: "";
        position: absolute;
        inset: 6px;
        border: 2px solid rgba(11, 15, 20, 0.85);
        border-radius: 5px;
        background:
          radial-gradient(circle at 30% 30%, rgba(11, 15, 20, 0.85) 2px, transparent 3px),
          radial-gradient(circle at 70% 70%, rgba(11, 15, 20, 0.85) 2px, transparent 3px),
          radial-gradient(circle at 70% 30%, rgba(11, 15, 20, 0.85) 2px, transparent 3px);
      }
      .word {
        line-height: 1.1;
      }
      .name {
        font-family: var(--font-sans);
        font-size: 17px;
        font-weight: 600;
        color: #e6edf3;
        letter-spacing: -0.01em;
      }
      .sub {
        font-family: var(--mono);
        font-size: 11px;
        color: #6e7a87;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        font-weight: 500;
        margin-top: 2px;
      }
      .swatches {
        display: flex;
        gap: 6px;
        margin-top: 28px;
      }
      .sw {
        padding: 8px 12px;
        border-radius: 6px;
        font-family: var(--mono);
        font-size: 10.5px;
      }
    </style>
  </head>
  <body>
    <div class="label">Brand mark · cyan→deep-cyan 135° gradient · 3-dot stamped pattern</div>
    <div class="row">
      <div class="mark-wrap">
        <div class="mark"></div>
        <div class="word">
          <div class="name">Context Studio</div>
          <div class="sub">CTX · v1.4</div>
        </div>
      </div>
      <div class="mark-wrap">
        <div class="mark" style="width: 28px; height: 28px; border-radius: 6px"></div>
        <div class="word"><div class="name" style="font-size: 14px">Context Studio</div></div>
      </div>
      <div class="mark-wrap">
        <div class="mark" style="width: 20px; height: 20px; border-radius: 5px"></div>
      </div>
    </div>
    <div class="swatches">
      <div class="sw" style="background: #22d3ee; color: #0b0f14">#22D3EE</div>
      <div class="sw" style="background: #0e7ea3; color: #fff">#0E7EA3</div>
      <div class="sw" style="background: #0b0f14; color: #e6edf3; border: 1px solid #1e2733">
        #0B0F14
      </div>
    </div>
  </body>
</html>

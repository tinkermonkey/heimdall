<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e9ee;
        border-radius: 8px;
        overflow: hidden;
      }
      .head {
        padding: 12px 14px;
        border-bottom: 1px solid #e5e9ee;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .name {
        font-size: 14px;
        font-weight: 600;
        color: #0b1220;
      }
      .desc {
        font-size: 12.5px;
        color: #475569;
        margin-top: 1px;
      }
      .flow {
        padding: 18px 16px;
        display: flex;
        gap: 0;
        align-items: center;
        background: linear-gradient(180deg, #fafbfc 0%, #fff 100%);
      }
      .node {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: #fff;
        border: 1px solid #d6dce3;
        border-radius: 6px;
        font-size: 12px;
      }
      .node .ic {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        display: grid;
        place-items: center;
        flex: none;
      }
      .node[data-k="source"] .ic {
        background: rgba(34, 211, 238, 0.12);
        color: #0e7490;
      }
      .node[data-k="extract"] .ic {
        background: rgba(167, 139, 250, 0.15);
        color: #5b21b6;
      }
      .node[data-k="resolve"] .ic {
        background: rgba(245, 158, 11, 0.15);
        color: #92400e;
      }
      .node[data-k="write"] .ic {
        background: rgba(16, 185, 129, 0.15);
        color: #065f46;
      }
      .node .ic svg {
        width: 13px;
        height: 13px;
      }
      .node .nm {
        font-weight: 500;
        color: #0b1220;
      }
      .node .sub {
        color: #64748b;
        font-family: var(--mono);
        font-size: 10.5px;
      }
      .arr {
        width: 24px;
        height: 1px;
        background: #d6dce3;
        flex: none;
        position: relative;
      }
      .arr::after {
        content: "";
        position: absolute;
        right: -1px;
        top: 50%;
        width: 5px;
        height: 5px;
        border-right: 1px solid #d6dce3;
        border-top: 1px solid #d6dce3;
        transform: translateY(-50%) rotate(45deg);
      }
      .foot {
        padding: 10px 14px;
        display: flex;
        gap: 18px;
        border-top: 1px solid #e5e9ee;
        background: #f7f9fb;
        font-size: 12px;
      }
      .foot .l {
        font-family: var(--mono);
        font-size: 10px;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .foot .v {
        font-size: 13px;
        color: #0b1220;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="label">Pipeline flow card</div>
    <div class="card">
      <div class="head">
        <div>
          <div class="name">Ingest organisms · GBIF</div>
          <div class="desc">Pull species records, normalize names, write to life.organism</div>
        </div>
      </div>
      <div class="flow">
        <div class="node" data-k="source">
          <div class="ic">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="9" />
              <path d="M3 12h18" />
            </svg>
          </div>
          <div>
            <div class="nm">GBIF API</div>
            <div class="sub">source</div>
          </div>
        </div>
        <div class="arr"></div>
        <div class="node" data-k="extract">
          <div class="ic">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m12 2 10 6-10 6L2 8z" />
              <path d="m2 16 10 6 10-6" />
            </svg>
          </div>
          <div>
            <div class="nm">Extract</div>
            <div class="sub">12 fields</div>
          </div>
        </div>
        <div class="arr"></div>
        <div class="node" data-k="resolve">
          <div class="ic">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 2 4 6v6c0 5 3.5 9 8 10 4.5-1 8-5 8-10V6z" />
            </svg>
          </div>
          <div>
            <div class="nm">Resolve</div>
            <div class="sub">match by name</div>
          </div>
        </div>
        <div class="arr"></div>
        <div class="node" data-k="write">
          <div class="ic">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <ellipse cx="12" cy="5" rx="9" ry="3" />
              <path d="M3 5v14c0 1.7 4 3 9 3s9-1.3 9-3V5" />
            </svg>
          </div>
          <div>
            <div class="nm">Write</div>
            <div class="sub">life.organism</div>
          </div>
        </div>
      </div>
      <div class="foot">
        <div>
          <div class="l">Last run</div>
          <div class="v">2m ago</div>
        </div>
        <div>
          <div class="l">Records</div>
          <div class="v">12,480</div>
        </div>
        <div>
          <div class="l">Status</div>
          <div class="v" style="color: #10b981">healthy</div>
        </div>
      </div>
    </div>
  </body>
</html>

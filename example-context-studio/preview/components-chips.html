<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: var(--mono);
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 3px;
        border: 1px solid;
        font-weight: 500;
        white-space: nowrap;
      }
      .chip .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
      }
      .env {
        color: #22d3ee;
        background: rgba(34, 211, 238, 0.12);
        border-color: rgba(34, 211, 238, 0.28);
        padding: 3px 8px;
        border-radius: 4px;
      }
      .ver {
        font-family: var(--mono);
        font-size: 10.5px;
        background: rgba(34, 211, 238, 0.08);
        color: #0e7ea3;
        border: 1px solid rgba(34, 211, 238, 0.18);
        padding: 1px 7px;
        border-radius: 999px;
      }
      .id {
        font-family: var(--mono);
        font-size: 11px;
        color: #64748b;
        background: #f7f9fb;
        padding: 2px 7px;
        border-radius: 3px;
        border: 1px solid #e5e9ee;
      }
    </style>
  </head>
  <body>
    <div class="label">Chips · semantic tints (mono · 11px · 3px radius)</div>
    <div class="row">
      <span class="chip" style="color: #0e7490; background: #ecfeff; border-color: #a5f3fc"
        ><span class="dot" style="background: #06b6d4"></span>cyan</span
      >
      <span class="chip" style="color: #92400e; background: #fffbeb; border-color: #fde68a"
        ><span class="dot" style="background: #f59e0b"></span>amber</span
      >
      <span class="chip" style="color: #5b21b6; background: #f5f3ff; border-color: #ddd6fe"
        ><span class="dot" style="background: #a78bfa"></span>violet</span
      >
      <span class="chip" style="color: #065f46; background: #ecfdf5; border-color: #a7f3d0"
        ><span class="dot" style="background: #10b981"></span>emerald</span
      >
      <span class="chip" style="color: #9f1239; background: #fff1f2; border-color: #fecdd3"
        ><span class="dot" style="background: #f43f5e"></span>rose</span
      >
      <span class="chip" style="color: #475569; background: #f7f9fb; border-color: #e5e9ee"
        ><span class="dot" style="background: #94a3b8"></span>gray</span
      >
    </div>
    <div class="label" style="margin-top: 18px">Pills & inline tags</div>
    <div class="row">
      <span class="env"
        ><span
          class="dot"
          style="
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 999px;
            background: #22d3ee;
            margin-right: 6px;
          "
        ></span
        >production</span
      >
      <span class="ver">v1.4.2</span>
      <span class="id">cls_4f3a7e</span>
      <span class="id">pipeline_run_812</span>
    </div>
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .field-label {
        font-size: 11.5px;
        font-weight: 500;
        color: #475569;
        margin-bottom: 6px;
        letter-spacing: 0.005em;
        display: flex;
        justify-content: space-between;
      }
      .field-hint {
        font-size: 10.5px;
        color: #64748b;
        font-weight: 400;
      }
      .input {
        display: block;
        width: 100%;
        box-sizing: border-box;
        background: #f7f9fb;
        border: 1px solid #e5e9ee;
        border-radius: 5px;
        padding: 7px 10px;
        font: inherit;
        font-size: 13px;
        color: #0b1220;
      }
      .input.focus {
        background: #fff;
        border-color: #22d3ee;
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.13);
        outline: 0;
      }
      .input.mono {
        font-family: var(--mono);
        font-size: 12px;
      }
      .req {
        color: #f43f5e;
        margin-left: 3px;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
    </style>
  </head>
  <body>
    <div class="label">Form inputs · default / focused / mono</div>
    <div class="grid">
      <div class="stack">
        <div>
          <div class="field-label">
            <span>Class name<span class="req">*</span></span
            ><span class="field-hint">snake_case</span>
          </div>
          <input class="input mono" value="organism" />
        </div>
        <div>
          <div class="field-label"><span>Display label</span></div>
          <input class="input focus" value="Organism" />
        </div>
      </div>
      <div class="stack">
        <div>
          <div class="field-label">
            <span>Description</span><span class="field-hint">Markdown supported</span>
          </div>
          <textarea
            class="input"
            rows="3"
            style="resize: vertical; min-height: 64px; line-height: 1.45"
          >
Any biological organism — animals, plants, microbes — modeled as instances of a taxonomic class.</textarea
          >
        </div>
        <div>
          <div class="field-label"><span>Domain</span></div>
          <select class="input">
            <option>life</option>
          </select>
        </div>
      </div>
    </div>
  </body>
</html>

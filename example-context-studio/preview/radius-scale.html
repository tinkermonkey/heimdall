<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 14px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .box {
        width: 70px;
        height: 60px;
        background: #0b1220;
        border: 1px solid #0b1220;
      }
      .name {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--canvas-fg-2);
        font-weight: 500;
      }
      .px {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--canvas-fg-3);
      }
      .use {
        font-family: var(--font-sans);
        font-size: 11px;
        color: var(--canvas-fg-3);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="label">Radius scale</div>
    <div class="grid">
      <div class="item">
        <div class="box" style="border-radius: 2px"></div>
        <div class="name">--radius-sm</div>
        <div class="px">2px</div>
        <div class="use">divider chips</div>
      </div>
      <div class="item">
        <div class="box" style="border-radius: 4px"></div>
        <div class="name">— 4px</div>
        <div class="px">4px</div>
        <div class="use">chips · table corners · nodes</div>
      </div>
      <div class="item">
        <div class="box" style="border-radius: 6px"></div>
        <div class="name">--radius-md</div>
        <div class="px">6px</div>
        <div class="use">buttons · inputs · nav items</div>
      </div>
      <div class="item">
        <div class="box" style="border-radius: 8px"></div>
        <div class="name">--radius-lg</div>
        <div class="px">8px</div>
        <div class="use">cards · panels · drawers</div>
      </div>
      <div class="item">
        <div class="box" style="border-radius: 12px"></div>
        <div class="name">--radius-xl</div>
        <div class="px">12px</div>
        <div class="use">modals · palette</div>
      </div>
      <div class="item">
        <div class="box" style="border-radius: 9999px"></div>
        <div class="name">--radius-full</div>
        <div class="px">9999px</div>
        <div class="use">dots · avatars · env pill</div>
      </div>
    </div>
  </body>
</html>

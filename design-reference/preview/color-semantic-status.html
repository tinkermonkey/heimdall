<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">

<div class="col" style="gap:10px;">
  <div class="row" style="gap:8px;flex-wrap:wrap;">
    <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:4px;background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#10B981;"></span>OK · RUNNING</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:4px;background:#FFFBEB;color:#92400E;border:1px solid #FDE68A;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#F59E0B;"></span>WARN · DEGRADED</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:4px;background:#FFF1F2;color:#9F1239;border:1px solid #FECDD3;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#F43F5E;"></span>ERROR · FAILED</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:4px;background:#ECFEFF;color:#0E7490;border:1px solid #A5F3FC;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#22D3EE;"></span>UPDATING · PULLING</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:4px;background:#F5F3FF;color:#5B21B6;border:1px solid #DDD6FE;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#8B5CF6;"></span>INFO · SECONDARY</span>
    <span style="display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:4px;background:#F7F9FB;color:#475569;border:1px solid #E5E9EE;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;"><span style="width:6px;height:6px;border-radius:50%;background:#6B7280;"></span>STOPPED · IDLE</span>
  </div>
  <div class="muted" style="font-size:12px;">Semantic status badges. Dot color = status; ~10% alpha tint background; matched border.</div>
</div>

</div></body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">

<div style="background:#FFF;border:1px solid #E5E9EE;border-radius:12px;overflow:hidden;box-shadow:0 24px 64px -16px rgba(0,0,0,0.55);">
  <!-- head -->
  <div style="padding:18px 20px 14px;border-bottom:1px solid #E5E9EE;">
    <div style="font-size:16px;font-weight:600;letter-spacing:-0.015em;color:#0B1220;">New class</div>
    <div style="font-size:12.5px;color:#64748B;margin-top:3px;">Classes belong to a concept scheme and inherit its domain color.</div>
  </div>
  <!-- body -->
  <div style="padding:16px 20px;display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;">
        IDENTIFIER
        <span style="text-transform:none;letter-spacing:0;color:#94A3B8;">snake_case · required</span>
      </div>
      <input style="border:1px solid #FBBF24;border-radius:6px;padding:8px 10px;font-family:'JetBrains Mono',monospace;font-size:13px;background:#FFF;color:#0B1220;outline:none;box-shadow:0 0 0 3px rgba(251,191,36,0.18);" value="cls_neuron_motor"/>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#64748B;">Must match /^cls_[a-z][a-z0-9_]*$/</div>
    </div>
  </div>
  <!-- foot -->
  <div style="display:flex;align-items:center;gap:8px;padding:12px 20px;background:#F7F9FB;border-top:1px solid #E5E9EE;">
    <span style="flex:1;font-family:'JetBrains Mono',monospace;font-size:11px;color:#64748B;">POST /classes</span>
    <button style="font-family:Inter;font-size:13px;font-weight:500;padding:7px 12px;border-radius:6px;border:1px solid transparent;background:transparent;color:#475569;cursor:pointer;">Cancel</button>
    <button style="font-family:Inter;font-size:13px;font-weight:500;padding:7px 12px;border-radius:6px;border:1px solid #B45309;background:#B45309;color:#FFF;cursor:pointer;">Create class</button>
  </div>
</div>

</div></body></html>

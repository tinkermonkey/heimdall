<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">

<style>
.pulse{position:relative;display:inline-block;width:6px;height:6px;border-radius:50%;}
.pulse::before{content:'';position:absolute;inset:0;border-radius:50%;background:inherit;opacity:0.55;animation:pl 1.6s ease-out infinite;}
@keyframes pl{0%{transform:scale(.6);opacity:.55}100%{transform:scale(1.6);opacity:0}}
</style>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
  <!-- icon-prefixed label + pulse meta row -->
  <div style="background:#FFF;border:1px solid #E5E9EE;border-left:2px solid #F59E0B;border-radius:8px;padding:12px 14px 14px;display:flex;flex-direction:column;gap:4px;">
    <div style="display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="6" height="12" rx="1"/><rect x="16" y="6" width="6" height="12" rx="1"/><path d="M8 12h8"/></svg>
      PIPELINES
    </div>
    <div style="font-family:Inter;font-size:28px;font-weight:700;letter-spacing:-0.02em;color:#0B1220;font-variant-numeric:tabular-nums;line-height:1.05;">1/11</div>
    <div style="display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:#64748B;">
      <span class="pulse" style="background:#F59E0B;"></span>
      <span style="font-family:'JetBrains Mono',monospace;">1 running · 2 failed</span>
    </div>
  </div>

  <!-- sparkline variant -->
  <div style="position:relative;background:#FFF;border:1px solid #E5E9EE;border-left:2px solid #22D3EE;border-radius:8px;padding:12px 14px 14px;display:flex;flex-direction:column;gap:4px;overflow:hidden;">
    <div style="display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 9 6 21 6"/><path d="M3 12 9 18 21 18"/></svg>
      INDIVIDUALS
    </div>
    <div style="font-family:Inter;font-size:28px;font-weight:700;letter-spacing:-0.02em;color:#0B1220;font-variant-numeric:tabular-nums;line-height:1.05;">267</div>
    <div style="font-size:11.5px;color:#64748B;display:flex;align-items:center;gap:4px;"><span style="color:#10B981;font-weight:500;">▲ 38</span> <span>last run</span></div>
    <svg width="88" height="28" viewBox="0 0 88 28" style="position:absolute;right:10px;bottom:10px;">
      <defs>
        <linearGradient id="sgrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.20"/>
          <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M0,22 L8,18 L16,20 L24,14 L32,16 L40,11 L48,13 L56,8 L64,10 L72,5 L80,7 L88,4 L88,28 L0,28 Z" fill="url(#sgrad)"/>
      <path d="M0,22 L8,18 L16,20 L24,14 L32,16 L40,11 L48,13 L56,8 L64,10 L72,5 L80,7 L88,4" stroke="#22D3EE" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</div>

<!-- Original 4-tile row, simplified -->
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
  <div style="background:#FFF;border:1px solid #E5E9EE;border-left:2px solid #22D3EE;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:2px;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;">TAXONOMIES</div>
    <div style="font-family:Inter;font-size:22px;font-weight:700;letter-spacing:-0.02em;color:#0B1220;font-variant-numeric:tabular-nums;">3</div>
    <div style="font-size:11px;color:#64748B;">3 active</div>
  </div>
  <div style="background:#FFF;border:1px solid #E5E9EE;border-left:2px solid #8B5CF6;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:2px;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;">CLASSES</div>
    <div style="font-family:Inter;font-size:22px;font-weight:700;letter-spacing:-0.02em;color:#0B1220;font-variant-numeric:tabular-nums;">22</div>
    <div style="font-size:11px;color:#64748B;"><span style="color:#10B981;">▲ 4</span> this week</div>
  </div>
  <div style="background:#FFF;border:1px solid #E5E9EE;border-left:2px solid #10B981;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:2px;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;">SCHEMES</div>
    <div style="font-family:Inter;font-size:22px;font-weight:700;letter-spacing:-0.02em;color:#0B1220;font-variant-numeric:tabular-nums;">5</div>
    <div style="font-size:11px;color:#64748B;">2 schemas</div>
  </div>
  <div style="background:#FFF;border:1px solid #E5E9EE;border-left:2px solid #F59E0B;border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:2px;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#64748B;">RELATIONS</div>
    <div style="font-family:Inter;font-size:22px;font-weight:700;letter-spacing:-0.02em;color:#0B1220;font-variant-numeric:tabular-nums;">9</div>
    <div style="font-size:11px;color:#64748B;">3 inferred</div>
  </div>
</div>

</div></body></html>

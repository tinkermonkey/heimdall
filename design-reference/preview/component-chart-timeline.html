<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" id="root"></div>
<script>
const tracks = [
  {label:'graph daemon', segments:[
    {start:0,  end:22, kind:'ok'},
    {start:22, end:28, kind:'warn'},
    {start:28, end:64, kind:'ok'},
    {start:64, end:68, kind:'error'},
    {start:68, end:100, kind:'ok'},
  ]},
  {label:'pubmed_genes', segments:[
    {start:0,  end:14, kind:'idle'},
    {start:14, end:38, kind:'info'},
    {start:38, end:41, kind:'idle'},
    {start:41, end:86, kind:'info'},
    {start:86, end:100, kind:'idle'},
  ]},
  {label:'nyx.lab', segments:[{start:0, end:100, kind:'ok'}]},
  {label:'vega.lab', segments:[
    {start:0,  end:48, kind:'ok'},
    {start:48, end:56, kind:'error'},
    {start:56, end:100, kind:'warn'},
  ]},
]
const xLabels = ['-24h','-18','-12','-6','now']
const range = [0,100]
const W = 480, H = 150
const pad = {top:6, right:8, bottom:22, left:92}
const innerW = W - pad.left - pad.right
const innerH = H - pad.top - pad.bottom
const rowH = innerH / tracks.length
const barH = Math.min(rowH*0.60, 14)
const xAt = v => pad.left + ((v-range[0])/(range[1]-range[0]||1))*innerW
const T = {fg2:'#475569', fg3:'#64748B', inset:'#F7F9FB'}
const KIND = {ok:'#10B981', warn:'#F59E0B', error:'#F43F5E', idle:'#F7F9FB', info:'#22D3EE'}

const trackEls = tracks.map((t,i)=>{
  const y = pad.top + i*rowH + (rowH-barH)/2
  const segs = t.segments.map(s=>{
    const x = xAt(s.start), w = Math.max(2, xAt(s.end)-xAt(s.start))
    return `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${w.toFixed(2)}" height="${barH.toFixed(2)}" fill="${KIND[s.kind]||s.kind}" rx="2"/>`
  }).join('')
  return `
    <text x="${pad.left-10}" y="${(y+barH*0.78).toFixed(2)}" text-anchor="end" font-family="JetBrains Mono" font-size="11" fill="${T.fg2}">${t.label}</text>
    <rect x="${pad.left}" y="${y.toFixed(2)}" width="${innerW}" height="${barH.toFixed(2)}" fill="${T.inset}" rx="2"/>
    ${segs}
  `
}).join('')

const xAxis = xLabels.map((lab,i)=>
  `<text x="${(pad.left+(i/(xLabels.length-1))*innerW).toFixed(2)}" y="${pad.top+innerH+14}" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="${T.fg3}">${lab}</text>`
).join('')

document.getElementById('root').innerHTML = `
<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">
  ${trackEls}${xAxis}
</svg>`
</script>
</body></html>

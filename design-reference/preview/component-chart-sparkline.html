<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" id="root"></div>
<script>
const data = [12,14,13,16,19,17,21,24,22,27,31,28,34,38,36,42,45,48,46,52]
const w = 88, h = 28, color = '#10B981'
const min = Math.min(...data), max = Math.max(...data)
const step = w / (data.length - 1)
const pts = data.map((v,i) => [i*step, h-2-((v-min)/(max-min||1))*(h-4)])
const line = pts.map(([x,y],i)=>(i?'L':'M')+x.toFixed(2)+','+y.toFixed(2)).join(' ')
const fill = line + ` L${w},${h} L0,${h} Z`
document.getElementById('root').innerHTML = `
<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
  <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="${color}" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
  </linearGradient></defs>
  <path d="${fill}" fill="url(#sg)"/>
  <path d="${line}" stroke="${color}" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`
</script>
</body></html>

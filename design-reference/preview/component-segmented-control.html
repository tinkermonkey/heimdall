<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">

<div class="row" style="gap:16px;flex-wrap:wrap;">
  <div style="display:inline-flex;padding:2px;background:#F7F9FB;border:1px solid #E5E9EE;border-radius:6px;">
    <button style="font-family:Inter;font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;border:0;background:#FFF;color:#0B1220;box-shadow:inset 0 0 0 1px #D6DCE3;cursor:pointer;">Any</button>
    <button style="font-family:Inter;font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;border:0;background:transparent;color:#64748B;cursor:pointer;">Single</button>
    <button style="font-family:Inter;font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;border:0;background:transparent;color:#64748B;cursor:pointer;">Multi</button>
  </div>

  <div style="display:inline-flex;padding:2px;background:#F7F9FB;border:1px solid #E5E9EE;border-radius:6px;">
    <button style="font-family:Inter;font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;border:0;background:transparent;color:#64748B;cursor:pointer;">All</button>
    <button style="font-family:Inter;font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;border:0;background:#FFF;color:#0B1220;box-shadow:inset 0 0 0 1px #D6DCE3;cursor:pointer;">Running</button>
    <button style="font-family:Inter;font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;border:0;background:transparent;color:#64748B;cursor:pointer;">Failed</button>
    <button style="font-family:Inter;font-size:12px;font-weight:500;padding:4px 10px;border-radius:4px;border:0;background:transparent;color:#64748B;cursor:pointer;">Stopped</button>
  </div>
</div>
<div class="muted" style="font-size:11.5px;">2px outer padding · canvas-bg-2 fill · 12/500 inner buttons · active = white card + 1px inset border. Up to 4 options; longer → FilterDropdown.</div>

</div></body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" id="root"></div>
<script>
// Same deterministic formula as ChartsTestPage.tsx (no Math.random)
const data = (() => {
  const rows = []
  for (let r = 0; r < 7; r++) {
    const row = []
    for (let c = 0; c < 24; c++) {
      const m = Math.sin((c-8)/24*Math.PI)*0.5+0.5
      const e = Math.exp(-Math.pow(c-20,2)/8)*0.8
      const wknd = (r===5||r===6) ? 0.7 : 1
      row.push(Math.max(0, (m*0.4+e*0.6)*wknd*0.9))
    }
    rows.push(row)
  }
  return rows
})()

const baseColor = '#10B981'
const yLabels = ['M','T','W','T','F','S','S']
const xLabels = ['0','','','','','','6','','','','','','12','','','','','','18','','','','','23']
const W = 320, H = 110
const pad = {top:4, right:8, bottom:18, left:28}
const rows = data.length, cols = data[0].length
const cw = (W-pad.left-pad.right)/cols
const ch = (H-pad.top-pad.bottom)/rows
const flat = data.flat()
const lo = Math.min(...flat), hi = Math.max(...flat)
const base = baseColor.replace('#','')
const T = {fg3:'#64748B'}

function shade(v) {
  if (v==null) return '#F7F9FB'
  const t = (v-lo)/(hi-lo||1)
  const alpha = Math.round((0.12+t*0.88)*255).toString(16).padStart(2,'0')
  return `#${base}${alpha}`
}

const cells = data.map((row,r)=>row.map((v,c)=>{
  const x = pad.left+c*cw+1, y = pad.top+r*ch+1
  return `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${Math.max(0,cw-2).toFixed(2)}" height="${Math.max(0,ch-2).toFixed(2)}" fill="${shade(v)}" rx="2"/>`
}).join('')).join('')

const yAxis = yLabels.map((lab,i)=>
  `<text x="${pad.left-6}" y="${(pad.top+i*ch+ch/2+3).toFixed(2)}" text-anchor="end" font-family="JetBrains Mono" font-size="9.5" fill="${T.fg3}">${lab}</text>`
).join('')

const xAxis = xLabels.map((lab,i)=>
  lab ? `<text x="${(pad.left+i*cw+cw/2).toFixed(2)}" y="${H-pad.bottom+12}" text-anchor="middle" font-family="JetBrains Mono" font-size="9.5" fill="${T.fg3}">${lab}</text>` : ''
).join('')

document.getElementById('root').innerHTML = `
<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">
  ${cells}${yAxis}${xAxis}
</svg>`
</script>
</body></html>

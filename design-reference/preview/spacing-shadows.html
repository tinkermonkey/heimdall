<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">

<div class="row" style="gap:16px;align-items:center;justify-content:space-around;padding:14px 0;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:80px;height:50px;background:#FFF;border:1px solid #E5E9EE;border-radius:8px;"></div>
    <div class="mono" style="font-size:10.5px;font-weight:500;">card · border-only</div>
    <div class="mono muted" style="font-size:10px;">no shadow</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:80px;height:50px;background:#FFF;border:1px solid #E5E9EE;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,0.05);"></div>
    <div class="mono" style="font-size:10.5px;font-weight:500;">--shadow-sm</div>
    <div class="mono muted" style="font-size:10px;">0 1px 2px / 5%</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:80px;height:50px;background:#FFF;border:1px solid #E5E9EE;border-radius:12px;box-shadow:0 24px 64px -16px rgba(0,0,0,0.55);"></div>
    <div class="mono" style="font-size:10.5px;font-weight:500;">--shadow-modal</div>
    <div class="mono muted" style="font-size:10px;">0 24 64 -16 / 55%</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
    <div style="width:80px;height:50px;background:#FFF;border:1px solid #E5E9EE;border-radius:8px;box-shadow:0 14px 40px -16px rgba(0,0,0,0.5);"></div>
    <div class="mono" style="font-size:10.5px;font-weight:500;">--shadow-toast</div>
    <div class="mono muted" style="font-size:10px;">0 14 40 -16 / 50%</div>
  </div>
</div>

</div></body></html>

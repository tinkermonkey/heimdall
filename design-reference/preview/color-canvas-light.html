<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">

<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;">
  
<div style="border:1px solid var(--canvas-border);border-radius:6px;overflow:hidden;">
  <div style="background:#FFFFFF;height:36px;"></div>
  <div style="padding:5px 8px;background:#FFF;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--canvas-fg-1);">--canvas-bg</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--canvas-fg-3);">#FFFFFF</div>
  </div>
</div>
  
<div style="border:1px solid var(--canvas-border);border-radius:6px;overflow:hidden;">
  <div style="background:#F7F9FB;height:36px;"></div>
  <div style="padding:5px 8px;background:#FFF;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--canvas-fg-1);">--canvas-bg-2</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--canvas-fg-3);">#F7F9FB</div>
  </div>
</div>
  
<div style="border:1px solid var(--canvas-border);border-radius:6px;overflow:hidden;">
  <div style="background:#F3F4F6;height:36px;"></div>
  <div style="padding:5px 8px;background:#FFF;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--canvas-fg-1);">--canvas-surface-2</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--canvas-fg-3);">#F3F4F6</div>
  </div>
</div>
  
<div style="border:1px solid var(--canvas-border);border-radius:6px;overflow:hidden;">
  <div style="background:#E5E9EE;height:36px;"></div>
  <div style="padding:5px 8px;background:#FFF;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--canvas-fg-1);">--canvas-border</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--canvas-fg-3);">#E5E9EE</div>
  </div>
</div>
  
<div style="border:1px solid var(--canvas-border);border-radius:6px;overflow:hidden;">
  <div style="background:#DDE2E8;height:36px;"></div>
  <div style="padding:5px 8px;background:#FFF;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--canvas-fg-1);">--canvas-border-2</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--canvas-fg-3);">#DDE2E8</div>
  </div>
</div>
  
<div style="border:1px solid var(--canvas-border);border-radius:6px;overflow:hidden;">
  <div style="background:#D6DCE3;height:36px;"></div>
  <div style="padding:5px 8px;background:#FFF;">
    <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;font-weight:500;color:var(--canvas-fg-1);">--canvas-border-strong</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--canvas-fg-3);">#D6DCE3</div>
  </div>
</div>
</div>
<div class="muted" style="font-size:12px;">Canvas — light mode (default). Page, insets, cards, borders.</div>

</div></body></html>

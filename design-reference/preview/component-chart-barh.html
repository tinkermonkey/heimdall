<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" id="root"></div>
<script>
const items = [
  {label:'nyx',    value:92, color:'#22D3EE'},
  {label:'aether', value:78, color:'#818CF8'},
  {label:'vega',   value:64, color:'#F59E0B'},
  {label:'helios', value:41, color:'#10B981'},
]
const W = 320, H = 140
const pad = {top:4, right:36, bottom:4, left:92}
const innerW = W - pad.left - pad.right
const innerH = H - pad.top - pad.bottom
const hi = Math.max(...items.map(it=>it.value))
const rowH = innerH / items.length
const barH = Math.min(rowH*0.62, 14)

function fmt(n){return Math.abs(n)>=1000?(n/1000).toFixed(1)+'k':Number.isInteger(n)?String(n):n.toFixed(1)}
const T = {fg2:'#475569', inset:'#F7F9FB'}

const rows = items.map((it,i)=>{
  const y = pad.top + i*rowH + (rowH-barH)/2
  const w = (it.value/hi)*innerW
  return `
    <text x="${pad.left-10}" y="${(y+barH*0.78).toFixed(2)}" text-anchor="end" font-family="JetBrains Mono" font-size="11" fill="${T.fg2}">${it.label}</text>
    <rect x="${pad.left}" y="${y.toFixed(2)}" width="${innerW}" height="${barH.toFixed(2)}" fill="${T.inset}" rx="2"/>
    <rect x="${pad.left}" y="${y.toFixed(2)}" width="${w.toFixed(2)}" height="${barH.toFixed(2)}" fill="${it.color}" rx="2"/>
    <text x="${(pad.left+w+6).toFixed(2)}" y="${(y+barH*0.78).toFixed(2)}" font-family="JetBrains Mono" font-size="11" fill="${T.fg2}" font-weight="500">${fmt(it.value)}</text>
  `
}).join('')

document.getElementById('root').innerHTML = `
<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">
  ${rows}
</svg>`
</script>
</body></html>

<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card" id="root"></div>
<script>
const values = [82,64,91,47,73,88,56,79,95,68,72,84]
const xLabels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']
const color = '#10B981'
const W = 480, H = 200
const pad = {top:8, right:8, bottom:22, left:30}
const innerW = W - pad.left - pad.right
const innerH = H - pad.top - pad.bottom
const threshold = {value:80, label:'sla'}
const ticks = 4

const hi = Math.max(...values, threshold.value)
const n = values.length
const gap = Math.max(2, innerW/n*0.22)
const bw = (innerW - gap*(n-1))/n
const yAt = v => pad.top + innerH - (v/hi)*innerH
const tickVals = Array.from({length:ticks+1},(_,i)=>(i/ticks)*hi)

function fmt(n){return Math.abs(n)>=1000?(n/1000).toFixed(1)+'k':Number.isInteger(n)?String(n):n.toFixed(1)}
const T = {fg3:'#64748B', border:'#E5E9EE', grid:'#EEF1F4'}

const gridLines = tickVals.map(v=>
  `<line x1="${pad.left}" x2="${W-pad.right}" y1="${yAt(v).toFixed(2)}" y2="${yAt(v).toFixed(2)}" stroke="${T.grid}" stroke-width="1"/>`
).join('')

const axisLines = `
  <line x1="${pad.left}" x2="${pad.left}" y1="${pad.top}" y2="${pad.top+innerH}" stroke="${T.border}" stroke-width="1"/>
  <line x1="${pad.left}" x2="${W-pad.right}" y1="${pad.top+innerH}" y2="${pad.top+innerH}" stroke="${T.border}" stroke-width="1"/>
  ${tickVals.map(v=>`<text x="${pad.left-6}" y="${(yAt(v)+3).toFixed(2)}" text-anchor="end" font-family="JetBrains Mono" font-size="10" fill="${T.fg3}">${fmt(v)}</text>`).join('')}
`

const bars = values.map((v,i)=>{
  const x = pad.left + i*(bw+gap)
  const y = yAt(v)
  const label = xLabels[i] ? `<text x="${(x+bw/2).toFixed(2)}" y="${pad.top+innerH+14}" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="${T.fg3}">${xLabels[i]}</text>` : ''
  return `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${bw.toFixed(2)}" height="${(pad.top+innerH-y).toFixed(2)}" fill="${color}" rx="1"/>${label}`
}).join('')

const threshY = yAt(threshold.value).toFixed(2)
const threshEl = `
  <line x1="${pad.left}" x2="${W-pad.right}" y1="${threshY}" y2="${threshY}" stroke="${T.fg3}" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="${W-pad.right-4}" y="${(yAt(threshold.value)-4).toFixed(2)}" text-anchor="end" font-family="JetBrains Mono" font-size="9.5" fill="${T.fg3}" style="text-transform:uppercase;letter-spacing:0.08em">${threshold.label}</text>
`

document.getElementById('root').innerHTML = `
<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="display:block">
  ${gridLines}${axisLines}${bars}${threshEl}
</svg>`
</script>
</body></html>

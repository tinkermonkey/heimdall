<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css"></head>
<body><div class="card">

<div class="row" style="gap:14px;align-items:flex-end;">
  
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#FBBF24,#B45309);border-radius:4px;"></div>
      <div class="mono" style="font-size:10.5px;font-weight:500;">--radius-sm</div>
      <div class="mono muted" style="font-size:10px;">4px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#FBBF24,#B45309);border-radius:6px;"></div>
      <div class="mono" style="font-size:10.5px;font-weight:500;">--radius-md</div>
      <div class="mono muted" style="font-size:10px;">6px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#FBBF24,#B45309);border-radius:8px;"></div>
      <div class="mono" style="font-size:10.5px;font-weight:500;">--radius-lg</div>
      <div class="mono muted" style="font-size:10px;">8px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#FBBF24,#B45309);border-radius:12px;"></div>
      <div class="mono" style="font-size:10.5px;font-weight:500;">--radius-xl</div>
      <div class="mono muted" style="font-size:10px;">12px</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
      <div style="width:64px;height:64px;background:linear-gradient(135deg,#FBBF24,#B45309);border-radius:50%;"></div>
      <div class="mono" style="font-size:10.5px;font-weight:500;">--radius-full</div>
      <div class="mono muted" style="font-size:10px;">full</div>
    </div>
</div>
<div class="muted" style="font-size:11.5px;text-align:center;">Small radii throughout. No pill shapes except env pill and dots.</div>

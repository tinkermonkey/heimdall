<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      .section {
        margin-bottom: 32px;
      }
      .stat {
        padding: 16px 14px;
        border: 1px solid var(--canvas-bd);
        border-radius: 8px;
        border-left: 2px solid;
        background: var(--canvas-bg);
      }
      .stat[data-color="cyan"] {
        border-left-color: var(--accent-cyan);
      }
      .stat[data-color="amber"] {
        border-left-color: var(--accent-amber);
      }
      .stat[data-color="violet"] {
        border-left-color: var(--accent-violet);
      }
      .stat[data-color="emerald"] {
        border-left-color: var(--accent-emerald);
      }
      .stat .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 8px;
        font-weight: 500;
      }
      .stat .num {
        font-size: 28px;
        font-weight: 700;
        color: var(--canvas-fg-1);
        margin-bottom: 8px;
        font-family: var(--font-sans);
      }
      .stat .meta {
        font-size: 11px;
        color: var(--canvas-fg-3);
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .stat .meta .delta-up {
        color: var(--accent-emerald);
        font-weight: 600;
      }
      .stat .meta .muted {
        color: var(--canvas-fg-3);
      }
    </style>
  </head>
  <body>
    <div class="eyebrow">Cluster Stats Grid</div>
    <p style="font-size: 12px; color: var(--canvas-fg-2); margin: 0 0 14px 0;">
      4-column stat grid showing cluster KPIs with color indicators
    </p>

    <div class="section">
      <div class="card-grid-4">
        <div class="stat" data-color="cyan">
          <div class="label">Power draw</div>
          <div class="num">847<span style="font-size: 16px; color: var(--canvas-fg-3); font-weight: 400; margin-left: 4px;">W</span></div>
          <div class="meta">
            <span class="delta-up">▲ 58 W</span>
            <span class="muted">vs 7d avg</span>
          </div>
        </div>
        <div class="stat" data-color="amber">
          <div class="label">Active alerts</div>
          <div class="num">2</div>
          <div class="meta">
            <span style="color: var(--accent-amber); font-weight: 500;">2 warn</span>
            <span class="muted">· 0 error</span>
          </div>
        </div>
        <div class="stat" data-color="violet">
          <div class="label">Egress today</div>
          <div class="num">12.4<span style="font-size: 16px; color: var(--canvas-fg-3); font-weight: 400; margin-left: 4px;">GB</span></div>
          <div class="meta">
            <span style="color: var(--accent-emerald);">▼ 8%</span>
            <span class="muted">vs 7d</span>
          </div>
        </div>
        <div class="stat" data-color="emerald">
          <div class="label">Cluster uptime</div>
          <div class="num">217<span style="font-size: 16px; color: var(--canvas-fg-3); font-weight: 400; margin-left: 4px;">d 14h</span></div>
          <div class="meta">
            <span style="display: inline-flex; align-items: center; gap: 6px;"><span style="width: 8px; height: 8px; border-radius: 50%; background: var(--accent-emerald);"></span></span>
            <span class="muted">all hosts up</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

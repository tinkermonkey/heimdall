<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 12px;
      }
      .scale {
        display: grid;
        grid-template-columns: repeat(9, 1fr);
        gap: 4px;
      }
      .sw {
        aspect-ratio: 1 / 1.1;
        border-radius: 4px;
        padding: 6px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        font-family: var(--mono);
        font-size: 9px;
        color: rgba(255, 255, 255, 0.85);
      }
      .sw .n {
        font-weight: 600;
      }
      .sw .h {
        font-size: 8.5px;
        opacity: 0.75;
      }
      .sw.light {
        color: #0e7ea3;
      }
      .accents {
        margin-top: 18px;
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
      }
      .ac {
        border-radius: 6px;
        height: 56px;
        padding: 8px;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        font-family: var(--mono);
        font-size: 10px;
      }
      .ac .n {
        font-weight: 500;
      }
      .ac .h {
        opacity: 0.8;
        font-size: 9.5px;
      }
    </style>
  </head>
  <body>
    <div class="label">Primary scale (cyan) · 50 → 900</div>
    <div class="scale">
      <div class="sw light" style="background: #e7f2f6">
        <div class="n">50</div>
        <div class="h">#E7F2F6</div>
      </div>
      <div class="sw light" style="background: #cfe5ed">
        <div class="n">100</div>
        <div class="h">#CFE5ED</div>
      </div>
      <div class="sw light" style="background: #b7d8e3">
        <div class="n">200</div>
        <div class="h">#B7D8E3</div>
      </div>
      <div class="sw light" style="background: #9fcbda">
        <div class="n">300</div>
        <div class="h">#9FCBDA</div>
      </div>
      <div class="sw" style="background: #87bfd1">
        <div class="n">400</div>
        <div class="h">#87BFD1</div>
      </div>
      <div class="sw" style="background: #3e98b5">
        <div class="n">500</div>
        <div class="h">#3E98B5</div>
      </div>
      <div class="sw" style="background: #268bac">
        <div class="n">600</div>
        <div class="h">#268BAC</div>
      </div>
      <div class="sw" style="background: #0e7ea3">
        <div class="n">700</div>
        <div class="h">#0E7EA3</div>
      </div>
      <div class="sw" style="background: #084c62">
        <div class="n">900</div>
        <div class="h">#084C62</div>
      </div>
    </div>

    <div class="label" style="margin-top: 22px">
      Studio accents · used for status, domains, intents
    </div>
    <div class="accents">
      <div class="ac" style="background: #22d3ee; color: #0b0f14">
        <div class="n">cyan</div>
        <div class="h">#22D3EE</div>
      </div>
      <div class="ac" style="background: #0e7ea3">
        <div class="n">cyan-deep</div>
        <div class="h">#0E7EA3</div>
      </div>
      <div class="ac" style="background: #a78bfa; color: #0b0f14">
        <div class="n">violet</div>
        <div class="h">#A78BFA</div>
      </div>
      <div class="ac" style="background: #10b981">
        <div class="n">emerald</div>
        <div class="h">#10B981</div>
      </div>
      <div class="ac" style="background: #f59e0b; color: #0b0f14">
        <div class="n">amber</div>
        <div class="h">#F59E0B</div>
      </div>
      <div class="ac" style="background: #f43f5e">
        <div class="n">rose</div>
        <div class="h">#F43F5E</div>
      </div>
      <div class="ac" style="background: #818cf8; color: #0b0f14">
        <div class="n">indigo</div>
        <div class="h">#818CF8</div>
      </div>
    </div>
  </body>
</html>

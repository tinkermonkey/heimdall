<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 24px 28px;
      }
      .pair {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        align-items: end;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .specimen-sans {
        font-family: var(--font-sans);
        font-size: 56px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1;
        color: var(--canvas-fg-1);
      }
      .specimen-mono {
        font-family: var(--mono);
        font-size: 36px;
        font-weight: 500;
        letter-spacing: -0.01em;
        line-height: 1.05;
        color: var(--canvas-fg-1);
      }
      .label-row {
        display: flex;
        gap: 10px;
        align-items: baseline;
      }
      .label-row .l {
        font-family: var(--mono);
        font-size: 10px;
        color: var(--canvas-fg-3);
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }
      .label-row .r {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--canvas-fg-2);
      }
      .weights {
        display: flex;
        gap: 14px;
        align-items: baseline;
        margin-top: 14px;
      }
      .weights span {
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <div class="pair">
      <div class="stack">
        <div class="label-row">
          <span class="l">SANS</span><span class="r">Inter · 400 / 500 / 600 / 700 / 800</span>
        </div>
        <div class="specimen-sans">Knowledge graph</div>
        <div class="weights" style="font-family: var(--font-sans)">
          <span style="font-weight: 400">Aa</span>
          <span style="font-weight: 500">Aa</span>
          <span style="font-weight: 600">Aa</span>
          <span style="font-weight: 700">Aa</span>
          <span style="font-weight: 800">Aa</span>
        </div>
      </div>
      <div class="stack">
        <div class="label-row">
          <span class="l">MONO</span><span class="r">JetBrains Mono · 400 / 500 / 600</span>
        </div>
        <div class="specimen-mono">cls_organism</div>
        <div class="weights" style="font-family: var(--mono)">
          <span style="font-weight: 400">Aa</span>
          <span style="font-weight: 500">Aa</span>
          <span style="font-weight: 600">Aa</span>
        </div>
      </div>
    </div>
  </body>
</html>

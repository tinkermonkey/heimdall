<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 13px;
        border: 1px solid #e5e9ee;
        border-radius: 8px;
        overflow: hidden;
      }
      th {
        text-align: left;
        font-family: var(--mono);
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #64748b;
        font-weight: 500;
        padding: 10px 14px;
        background: #f7f9fb;
        border-bottom: 1px solid #e5e9ee;
      }
      td {
        padding: 11px 14px;
        border-bottom: 1px solid #e5e9ee;
        color: #0b1220;
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: 0;
      }
      tr.selected td {
        background: rgba(34, 211, 238, 0.05);
      }
      .mono {
        font-family: var(--mono);
        font-size: 12px;
        color: #475569;
      }
      .row-link {
        color: #0e7ea3;
        font-weight: 500;
        cursor: pointer;
      }
      .check {
        width: 14px;
        height: 14px;
        border: 1.5px solid #d6dce3;
        border-radius: 3px;
        display: inline-block;
        vertical-align: middle;
      }
      .check.on {
        background: #0e7ea3;
        border-color: #0e7ea3;
        position: relative;
      }
      .check.on::after {
        content: "";
        position: absolute;
        left: 3px;
        top: 0px;
        width: 4px;
        height: 8px;
        border: solid #fff;
        border-width: 0 1.5px 1.5px 0;
        transform: rotate(45deg);
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: var(--mono);
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 3px;
        border: 1px solid;
        font-weight: 500;
      }
      .chip .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
      }
    </style>
  </head>
  <body>
    <div class="label">Table · mono ID column · cyan row links · 5% cyan selected row</div>
    <table>
      <thead>
        <tr>
          <th style="width: 30px"><span class="check"></span></th>
          <th>Name</th>
          <th>Class</th>
          <th>Status</th>
          <th>Updated</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><span class="check on"></span></td>
          <td><span class="mono">cls_4f3a</span> <span class="row-link">organism</span></td>
          <td>
            <span class="chip" style="color: #065f46; background: #ecfdf5; border-color: #a7f3d0"
              ><span class="dot" style="background: #10b981"></span>life</span
            >
          </td>
          <td>
            <span class="chip" style="color: #065f46; background: #ecfdf5; border-color: #a7f3d0"
              ><span class="dot" style="background: #10b981"></span>active</span
            >
          </td>
          <td class="mono">2m ago</td>
        </tr>
        <tr class="selected">
          <td><span class="check on"></span></td>
          <td><span class="mono">cls_8b21</span> <span class="row-link">station</span></td>
          <td>
            <span class="chip" style="color: #92400e; background: #fffbeb; border-color: #fde68a"
              ><span class="dot" style="background: #f59e0b"></span>climate</span
            >
          </td>
          <td>
            <span class="chip" style="color: #0e7490; background: #ecfeff; border-color: #a5f3fc"
              ><span class="dot" style="background: #06b6d4"></span>syncing</span
            >
          </td>
          <td class="mono">12m ago</td>
        </tr>
        <tr>
          <td><span class="check"></span></td>
          <td><span class="mono">cls_e007</span> <span class="row-link">service</span></td>
          <td>
            <span class="chip" style="color: #5b21b6; background: #f5f3ff; border-color: #ddd6fe"
              ><span class="dot" style="background: #a78bfa"></span>software</span
            >
          </td>
          <td>
            <span class="chip" style="color: #9f1239; background: #fff1f2; border-color: #fecdd3"
              ><span class="dot" style="background: #f43f5e"></span>error</span
            >
          </td>
          <td class="mono">1h ago</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>

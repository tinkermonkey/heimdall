<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      .scale {
        display: grid;
        grid-template-columns: 90px 1fr 70px;
        gap: 14px;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px dashed var(--canvas-bd);
      }
      .scale:last-child {
        border-bottom: 0;
      }
      .tok {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--canvas-fg-2);
      }
      .px {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--canvas-fg-3);
        text-align: right;
      }
      .bar {
        height: 10px;
        border-radius: 2px;
        background: var(--accent-cyan-deep, #0e7ea3);
      }
      .head {
        display: grid;
        grid-template-columns: 90px 1fr 70px;
        gap: 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--canvas-bd);
        margin-bottom: 6px;
      }
      .head .h {
        font-family: var(--mono);
        font-size: 9.5px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-4);
      }
    </style>
  </head>
  <body>
    <div class="label">Spacing · Tailwind 4px scale</div>
    <div class="head">
      <div class="h">token</div>
      <div class="h">visual</div>
      <div class="h" style="text-align: right">px</div>
    </div>
    <div class="scale">
      <div class="tok">--space-1</div>
      <div class="bar" style="width: 4px"></div>
      <div class="px">4</div>
    </div>
    <div class="scale">
      <div class="tok">--space-2</div>
      <div class="bar" style="width: 8px"></div>
      <div class="px">8</div>
    </div>
    <div class="scale">
      <div class="tok">--space-3</div>
      <div class="bar" style="width: 12px"></div>
      <div class="px">12</div>
    </div>
    <div class="scale">
      <div class="tok">--space-4</div>
      <div class="bar" style="width: 16px"></div>
      <div class="px">16</div>
    </div>
    <div class="scale">
      <div class="tok">--space-5</div>
      <div class="bar" style="width: 20px"></div>
      <div class="px">20</div>
    </div>
    <div class="scale">
      <div class="tok">--space-6</div>
      <div class="bar" style="width: 24px"></div>
      <div class="px">24 · card pad</div>
    </div>
    <div class="scale">
      <div class="tok">--space-8</div>
      <div class="bar" style="width: 32px"></div>
      <div class="px">32</div>
    </div>
    <div class="scale">
      <div class="tok">--space-10</div>
      <div class="bar" style="width: 40px"></div>
      <div class="px">40</div>
    </div>
    <div class="scale">
      <div class="tok">--space-12</div>
      <div class="bar" style="width: 48px"></div>
      <div class="px">48</div>
    </div>
    <div class="scale">
      <div class="tok">--space-16</div>
      <div class="bar" style="width: 64px"></div>
      <div class="px">64</div>
    </div>
  </body>
</html>

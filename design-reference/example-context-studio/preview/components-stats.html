<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
        background: #ffffff;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 14px;
      }
      .stat {
        background: #fff;
        border: 1px solid #e5e9ee;
        border-radius: 8px;
        padding: 16px;
        position: relative;
        overflow: hidden;
      }
      .stat::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 2px;
      }
      .stat.cyan::before {
        background: #22d3ee;
      }
      .stat.violet::before {
        background: #a78bfa;
      }
      .stat.amber::before {
        background: #f59e0b;
      }
      .stat.emerald::before {
        background: #10b981;
      }
      .stat .label {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        color: #64748b;
        text-transform: uppercase;
        font-weight: 500;
      }
      .stat .num {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: #0b1220;
        line-height: 1.1;
        margin-top: 6px;
        font-feature-settings: "tnum";
      }
      .stat .meta {
        margin-top: 6px;
        font-size: 12px;
        color: #475569;
        display: flex;
        gap: 6px;
      }
      .delta-up {
        color: #10b981;
        font-weight: 500;
      }
      .delta-dn {
        color: #f43f5e;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="stat cyan">
        <div class="label">Classes</div>
        <div class="num">128</div>
        <div class="meta"><span class="delta-up">+4</span> · this week</div>
      </div>
      <div class="stat violet">
        <div class="label">Individuals</div>
        <div class="num">12,480</div>
        <div class="meta"><span class="delta-up">+312</span> · today</div>
      </div>
      <div class="stat amber">
        <div class="label">Pipelines</div>
        <div class="num">17</div>
        <div class="meta">3 running</div>
      </div>
      <div class="stat emerald">
        <div class="label">Last run</div>
        <div class="num" style="font-size: 22px; font-family: var(--mono); font-weight: 600">
          2m ago
        </div>
        <div class="meta"><span class="delta-up">●</span> healthy</div>
      </div>
    </div>
  </body>
</html>

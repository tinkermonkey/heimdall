<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 22px 28px;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .toast {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 11px 12px;
        border: 1px solid #e5e9ee;
        border-radius: 7px;
        background: #fff;
        box-shadow: 0 14px 40px -16px rgba(0, 0, 0, 0.3);
      }
      .mark {
        width: 22px;
        height: 22px;
        border-radius: 11px;
        display: grid;
        place-items: center;
        flex: none;
      }
      .title {
        font-size: 12.5px;
        color: #0b1220;
        font-weight: 500;
      }
      .sub {
        font-size: 11.5px;
        color: #64748b;
        margin-top: 2px;
        line-height: 1.4;
      }
      .mono-title {
        font-family: var(--mono);
        font-size: 11.5px;
      }
      .pulse {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #10b981;
        position: relative;
        display: inline-block;
        vertical-align: middle;
        margin-right: 6px;
      }
      .pulse::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: 999px;
        background: #10b981;
        opacity: 0.3;
        animation: pulse 1.6s ease-out infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(0.6);
          opacity: 0.5;
        }
        100% {
          transform: scale(1.4);
          opacity: 0;
        }
      }
      .status-line {
        font-size: 12px;
        color: #475569;
        padding-top: 14px;
      }
    </style>
  </head>
  <body>
    <div class="label">Toasts · success / error · slide-in 220ms</div>
    <div class="grid">
      <div class="toast">
        <div class="mark" style="background: rgba(16, 185, 129, 0.16); color: #10b981">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </div>
        <div>
          <div class="title">Class created</div>
          <div class="sub">cls_organism · 2 attributes</div>
        </div>
      </div>
      <div class="toast">
        <div class="mark" style="background: rgba(244, 63, 94, 0.16); color: #f43f5e">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        </div>
        <div>
          <div class="title mono-title">pipeline.run.failed</div>
          <div class="sub">connection refused at step 2</div>
        </div>
      </div>
    </div>
    <div class="status-line">
      <span class="pulse"></span>connected · life.organism · 12,480 records
    </div>
  </body>
</html>

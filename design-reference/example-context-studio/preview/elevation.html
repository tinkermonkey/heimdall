<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_base.css" />
    <style>
      body {
        padding: 26px 28px;
        background: #f7f9fb;
      }
      .label {
        font-family: var(--mono);
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--canvas-fg-3);
        margin-bottom: 18px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 18px;
      }
      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .box {
        width: 100%;
        height: 70px;
        background: #ffffff;
        border-radius: 8px;
      }
      .name {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--canvas-fg-2);
        font-weight: 500;
      }
      .use {
        font-family: var(--font-sans);
        font-size: 11px;
        color: var(--canvas-fg-3);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="label">Elevation · borders do most of the work; shadows are reserved</div>
    <div class="grid">
      <div class="item">
        <div class="box" style="border: 1px solid #e5e9ee; box-shadow: none"></div>
        <div class="name">card / panel</div>
        <div class="use">1px border, no shadow</div>
      </div>
      <div class="item">
        <div
          class="box"
          style="
            box-shadow:
              0 1px 3px 0 rgba(0, 0, 0, 0.1),
              0 1px 2px -1px rgba(0, 0, 0, 0.1);
          "
        ></div>
        <div class="name">--shadow</div>
        <div class="use">subtle hover lift</div>
      </div>
      <div class="item">
        <div
          class="box"
          style="
            box-shadow:
              0 4px 6px -1px rgba(0, 0, 0, 0.1),
              0 2px 4px -2px rgba(0, 0, 0, 0.1);
          "
        ></div>
        <div class="name">--shadow-md</div>
        <div class="use">menus, popovers</div>
      </div>
      <div class="item">
        <div
          class="box"
          style="
            box-shadow:
              0 24px 64px -16px rgba(0, 0, 0, 0.55),
              0 0 0 1px rgba(255, 255, 255, 0.02);
          "
        ></div>
        <div class="name">modal</div>
        <div class="use">overlay only</div>
      </div>
    </div>
  </body>
</html>

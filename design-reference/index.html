<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Heimdall — Design System</title>
    <style>
      body {
        background: var(--shell-bg);
        color: var(--shell-fg-1);
        min-height: 100vh;
        padding: 0;
      }

      /* ---- Header (shell chrome — always dark) ---- */
      .idx-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        border-bottom: 1px solid var(--shell-border);
        background: var(--shell-bg-2);
      }
      .wordmark {
        font-family: var(--mono);
        font-size: 18px;
        font-weight: 600;
        color: var(--shell-fg-1);
        letter-spacing: -0.02em;
      }
      .wordmark em {
        font-style: normal;
        color: var(--accent-primary);
      }
      .hd-sep {
        width: 1px;
        height: 14px;
        background: var(--shell-border-2);
      }
      .hd-sub {
        font-family: var(--mono);
        font-size: 10.5px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--shell-fg-3);
      }
      .hd-spacer { flex: 1; }

      /* Canvas mode toggle button */
      .canvas-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 6px;
        border: 1px solid var(--shell-border);
        background: transparent;
        color: var(--shell-fg-3);
        cursor: pointer;
        transition: color 120ms, border-color 120ms, background 120ms;
        padding: 0;
      }
      .canvas-toggle:hover {
        background: var(--shell-surface);
        border-color: var(--shell-border-2);
        color: var(--shell-fg-1);
      }
      body.dark-canvas .canvas-toggle {
        color: var(--accent-primary);
        border-color: rgba(245, 158, 11, 0.35);
      }

      /* ---- Shell content area ---- */
      main {
        padding: 40px;
        max-width: 1280px;
        min-height: calc(100vh - 57px);
      }

      .section {
        margin-bottom: 44px;
      }
      .section-label {
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--shell-fg-3);
        margin-bottom: 12px;
      }

      /* ---- Cards ---- */
      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
        gap: 6px;
      }
      .card-grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        max-width: 720px;
      }

      .card {
        display: flex;
        flex-direction: column;
        gap: 3px;
        padding: 12px 14px;
        background: var(--shell-surface);
        border: 1px solid var(--shell-border);
        border-radius: 6px;
        text-decoration: none;
        color: inherit;
        position: relative;
        transition: background 100ms ease, border-color 100ms ease;
        overflow: hidden;
      }
      .card::before {
        content: '';
        position: absolute;
        left: 0;
        top: 8px;
        bottom: 8px;
        width: 2px;
        border-radius: 0 2px 2px 0;
        background: transparent;
        transition: background 100ms ease;
      }
      .card:hover {
        background: var(--shell-surface-2);
        border-color: var(--shell-border-2);
      }
      .card:hover::before {
        background: var(--accent-primary);
      }

      .card-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--shell-fg-1);
        line-height: 1.3;
      }
      .card-meta {
        font-family: var(--mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--shell-fg-4);
      }

      /* Large card variant (prototypes) */
      .card-lg {
        padding: 20px 22px;
        gap: 0;
      }
      .card-lg .card-title {
        font-size: 14px;
        margin-bottom: 6px;
      }
      .card-lg .card-desc {
        font-size: 12px;
        color: var(--shell-fg-2);
        line-height: 1.65;
        margin-bottom: 14px;
      }
      .card-lg .card-badge {
        display: inline-block;
        font-family: var(--mono);
        font-size: 9.5px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--accent-primary);
        border: 1px solid rgba(245, 158, 11, 0.25);
        border-radius: 3px;
        padding: 2px 7px;
      }
    </style>
  </head>
  <body>
    <header class="idx-header">
      <div class="wordmark">heimdall<em>.</em></div>
      <div class="hd-sep"></div>
      <div class="hd-sub">Design system</div>
      <div class="hd-spacer"></div>
      <button id="canvas-toggle" class="canvas-toggle" title="Toggle dark canvas" aria-pressed="false">
        <svg id="toggle-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path id="toggle-path" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <main>

    </main>
    <script>
      const MOON = 'M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z';
      const SUN  = 'M12 3v2M12 19v2M5.64 5.64l1.42 1.42M16.95 16.95l1.41 1.41M3 12h2M19 12h2M5.64 18.36l1.41-1.41M16.95 7.05l1.41-1.41M12 7a5 5 0 1 0 0 10A5 5 0 0 0 12 7z';

      function applyDarkCanvas(dark) {
        document.body.classList.toggle('dark-canvas', dark);
        const btn = document.getElementById('canvas-toggle');
        const path = document.getElementById('toggle-path');
        if (btn) btn.setAttribute('aria-pressed', dark ? 'true' : 'false');
        if (path) path.setAttribute('d', dark ? SUN : MOON);
      }

      // Apply stored preference on load
      applyDarkCanvas(localStorage.getItem('heimdall-dark-canvas') === '1');

      document.getElementById('canvas-toggle').addEventListener('click', function () {
        const next = !document.body.classList.contains('dark-canvas');
        localStorage.setItem('heimdall-dark-canvas', next ? '1' : '0');
        applyDarkCanvas(next);
      });
    </script>
  </body>
</html>
